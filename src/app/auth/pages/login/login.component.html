<div class="form-container">
  <img src="images/logo.svg" alt="Skolaris Logo" class="logo" />
  <h1 class="title">Bem-vindo ao Skolaris</h1>
  <p class="subtitle">Faça login para acessar sua conta</p>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="row">
      <div class="col-12">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" />
          <mat-icon matPrefix>email</mat-icon>
        </mat-form-field>
      </div>
      <div class="col-12">
        <div class="d-flex justify-content-end mb-2">
          <a routerLink="/auth/forgot-password">Esqueci minha senha</a>
        </div>
        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'" />
          <mat-icon matPrefix>lock</mat-icon>
          <button
            matSuffix
            type="button"
            mat-icon-button
            (click)="togglePasswordVisibility()"
            tabindex="-1"
          >
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>
      </div>

      <div class="col-12 mb-3">
        <mat-checkbox formControlName="rememberMe">Lembrar de mim</mat-checkbox>
      </div>

      <div class="col-12">
        <button matButton="filled" class="w-100" [disabled]="form.invalid">Entrar</button>
      </div>

      <div class="col-12 mt-3 text-center">
        <mat-divider class="my-4"></mat-divider>
        <span>Precisa de acesso? </span>
        <a (click)="sendWhatsappMessage()">Entre em contato com o administrador</a>
      </div>
    </div>
  </form>
</div>
